{% extends "layout.html" %}

{% block content %}
<div class="form-wrapper" style="max-width: 500px; margin-top: 50px;">
    <div class="form-header">
        <h2><i class="fas fa-user-circle"></i> User Login / Register</h2>
        <p>Access your health profile.</p>
    </div>
    <form action="{{ url_for('login') }}" method="POST" class="assessment-form" id="loginForm">
        <div class="form-group">
            <label for="username">Patient Name <span class="required">*</span></label>
            <input type="text" id="username" name="username" required placeholder="Enter your name">
        </div>

        <div class="form-row split-row">
            <div class="form-group" style="flex:1;">
                <label for="phone">Mobile Number <span class="required">*</span></label>
                <div style="display: flex; gap:10px;">
                    <input type="text" id="phone" name="phone" required placeholder="10-digit number" style="flex:1;">
                    <button type="button" id="sendOtpBtn" class="btn btn-outline"
                        style="padding: 10px; font-size:0.9rem;" onclick="sendOTP()">Send OTP</button>
                </div>
            </div>
            <div class="form-group" style="flex:1;">
                <label for="email">Email Address <span class="required">*</span></label>
                <input type="email" id="email" name="email" required placeholder="patient@mail.com">
            </div>
        </div>

        <div class="form-group" id="otpGroup"
            style="display:none; background: #e0f2fe; padding: 15px; border-radius: 8px;">
            <label for="otp" style="color: #0369a1;">Enter OTP <span class="required">*</span></label>
            <input type="text" id="otp" name="otp" placeholder="4-digit code" style="border-color: #38bdf8;">
        </div>

        <div class="form-row split-row">
            <div class="form-group">
                <label for="weight">Weight (kg) </label>
                <input type="number" id="weight" name="weight" placeholder="E.g. 65">
            </div>
            <div class="form-group">
                <label for="disease">Any Pre-existing Diseases?</label>
                <input type="text" id="disease" name="disease" placeholder="E.g. Asthma, Diabetes">
                <small class="hint">Leave blank if none.</small>
            </div>
        </div>

        <div class="form-actions" style="display:flex; justify-content: center;">
            <button type="submit" class="btn btn-primary btn-large" style="width:100%;" id="submitBtn" disabled>Verify
                Mobile & Register <i class="fas fa-sign-in-alt"></i></button>
        </div>
    </form>
</div>

<script>
    function sendOTP() {
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;

        if (!phone || phone.length < 10) {
            alert("Please enter a valid 10-digit mobile number first.");
            return;
        }
        if (!email) {
            alert("Please enter a valid email address first.");
            return;
        }

        document.getElementById('sendOtpBtn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

        fetch("{{ url_for('send_otp') }}", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ phone: phone, email: email })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('sendOtpBtn').innerHTML = '<i class="fas fa-check"></i> Sent';
                    document.getElementById('sendOtpBtn').classList.add('success-btn');
                    document.getElementById('sendOtpBtn').style.backgroundColor = '#10b981';
                    document.getElementById('sendOtpBtn').style.color = 'white';
                    document.getElementById('sendOtpBtn').disabled = true;

                    // Show OTP field
                    document.getElementById('otpGroup').style.display = 'block';
                    document.getElementById('submitBtn').disabled = false;

                    // Hackathon Demo Alert (Simulating SMS)
                    alert("🟢 SMS RECEIVED 🟢\n" + data.message);
                }
            });
    }
</script>
{% endblock %}
