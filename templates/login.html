{% extends "layout.html" %}

{% block content %}
<div class="form-wrapper" style="max-width: 500px; margin-top: 50px;">
    <div class="form-header">
        <h2><i class="fas fa-user-circle"></i> User Login / Register</h2>
        <p>Access your health profile.</p>
    </div>
    <form action="{{ url_for('login') }}" method="POST" class="assessment-form">
        <div class="form-group">
            <label for="username">Name <span class="required">*</span></label>
            <input type="text" id="username" name="username" required placeholder="Enter your name">
        </div>

        <div class="form-row split-row">
            <div class="form-group">
                <label for="weight">Weight (kg) </label>
                <input type="number" id="weight" name="weight" placeholder="E.g. 65">
            </div>
            <div class="form-group">
                <label for="disease">Any Pre-existing Diseases?</label>
                <input type="text" id="disease" name="disease" placeholder="E.g. Asthma, Diabetes">
                <small class="hint">Leave blank if none.</small>
            </div>
        </div>

        <div class="form-actions" style="display:flex; justify-content: center;">
            <button type="submit" class="btn btn-primary btn-large" style="width:100%;">Create Profile / Login <i
                    class="fas fa-sign-in-alt"></i></button>
        </div>
    </form>
</div>
{% endblock %}
